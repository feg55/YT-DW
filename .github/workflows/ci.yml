name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-and-tests:
    name: Lint and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          python -m pip install --no-deps -e .

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format
        run: python -m ruff format --check .

      - name: Mypy
        run: python -m mypy src/openmediadl

      - name: Unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -m "not integration"

  windows-build:
    name: Build Windows application
    runs-on: windows-latest
    timeout-minutes: 30
    needs: quality-and-tests
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          python -m pip install --no-deps -e .

      - name: Build with PyInstaller
        run: python -m PyInstaller --clean --noconfirm OpenMediaDL.spec

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: OpenMediaDL-windows-x64
          path: dist/OpenMediaDL.exe
          if-no-files-found: error
          retention-days: 14
